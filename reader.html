<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đang đọc — Hoa Sơn Tái Khởi</title>
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="reading">
  <canvas id="petals" aria-hidden="true"></canvas>
  <div class="read-progress" id="readProgress"></div>

  <header class="topbar">
    <a class="brand" href="index.html">Hoa Sơn <span>Tái Khởi</span></a>
    <div class="spacer"></div>
    <button class="nav-btn" id="prevBtn" title="Chương trước">
      <span class="ic">‹</span><span class="lbl"> Chương trước</span>
    </button>
    <span class="stat now-reading" id="nowReading"></span>
    <button class="nav-btn icon-btn" id="fontDown" title="Giảm cỡ chữ">A−</button>
    <button class="nav-btn icon-btn" id="fontUp" title="Tăng cỡ chữ">A+</button>
    <button class="nav-btn" id="menuBtn" title="Mục lục">
      <span class="ic">☰</span><span class="lbl"> Mục lục</span>
    </button>
  </header>

  <!-- Floating action menu (bottom-left) -->
  <div class="fab" id="fab">
    <div class="fab-items">
      <button class="fab-item" id="fabSearch" title="Tìm trong trang">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="18" y2="18"/></svg>
      </button>
      <button class="fab-item" id="fabTag" title="Đánh dấu vị trí">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2h10a1 1 0 0 1 1 1v15l-6-4-6 4V3a1 1 0 0 1 1-1z"/></svg>
      </button>
    </div>
    <button class="fab-hub" id="fabHub" title="Menu">+</button>
  </div>

  <!-- Slide-down in-page search bar -->
  <div class="search-bar" id="searchBar">
    <button class="search-bar-btn" id="searchClose">✕</button>
    <input class="search-bar-input" id="searchInput" type="search"
           placeholder="Tìm trong trang…" autocomplete="off" />
    <span class="search-bar-count" id="searchCount"></span>
    <button class="search-bar-btn" id="searchPrev" title="Kết quả trước">↑</button>
    <button class="search-bar-btn" id="searchNext" title="Kết quả tiếp">↓</button>
  </div>

  <div class="tag-toast" id="tagToast"></div>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="drawer" aria-label="Mục lục">
    <div class="drawer-head">
      <strong>Mục lục</strong>
      <button class="drawer-close" id="drawerClose" title="Đóng">✕</button>
    </div>
    <input class="drawer-search" id="drawerSearch" type="search"
           placeholder="Tìm chương… (vd 202)" />
    <div class="drawer-list" id="drawerList"></div>
  </aside>

  <main class="reader" id="reader"></main>

  <button class="to-top" id="toTop" title="Lên đầu trang">↑</button>

  <script src="data.js"></script>
  <script src="tracker.js"></script>
  <script src="petals.js"></script>
  <script src="reader.js"></script>
</body>
</html>
