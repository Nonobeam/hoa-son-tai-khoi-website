<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đang đọc — Hoa Sơn Tái Khởi</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="reading">
  <canvas id="petals" aria-hidden="true"></canvas>
  <div class="read-progress" id="readProgress"></div>

  <header class="topbar">
    <a class="brand" href="index.html">Hoa Sơn <span>Tái Khởi</span></a>
    <div class="spacer"></div>
    <button class="nav-btn" id="prevBtn" title="Chương trước">
      <span class="ic">‹</span><span class="lbl"> Chương trước</span>
    </button>
    <span class="stat now-reading" id="nowReading"></span>
    <button class="nav-btn icon-btn" id="fontDown" title="Giảm cỡ chữ">A−</button>
    <button class="nav-btn icon-btn" id="fontUp" title="Tăng cỡ chữ">A+</button>
    <button class="nav-btn icon-btn" id="goToTagBtn" title="Đến vị trí đã đánh dấu" disabled>📍</button>
    <button class="nav-btn" id="menuBtn" title="Mục lục">
      <span class="ic">☰</span><span class="lbl"> Mục lục</span>
    </button>
  </header>

  <button class="tag-popup" id="tagPopup" type="button">🔖 Đánh dấu</button>
  <div class="tag-toast" id="tagToast"></div>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="drawer" aria-label="Mục lục">
    <div class="drawer-head">
      <strong>Mục lục</strong>
      <button class="drawer-close" id="drawerClose" title="Đóng">✕</button>
    </div>
    <input class="drawer-search" id="drawerSearch" type="search"
           placeholder="Tìm chương… (vd 202)" />
    <div class="drawer-list" id="drawerList"></div>
  </aside>

  <main class="reader" id="reader"></main>

  <button class="to-top" id="toTop" title="Lên đầu trang">↑</button>

  <script src="data.js"></script>
  <script src="tracker.js"></script>
  <script src="petals.js"></script>
  <script src="reader.js"></script>
</body>
</html>
